name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux-x64:
    name: Release Linux x64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.77
        run: |
          rustup toolchain install 1.77 --profile minimal
          rustup default 1.77

      - name: Install build and packaging tools
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            apt-utils \
            cargo \
            createrepo-c \
            dpkg-dev \
            git \
            gjs \
            gir1.2-adw-1 \
            gir1.2-gtk-4.0 \
            gnome-shell \
            gnupg \
            jq \
            libdbus-1-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            rpm \
            zip

      - name: Build release packages
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ] || [ -z "$VERSION" ]; then
            VERSION="$(cargo metadata --manifest-path daemon/Cargo.toml --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "livedesk-daemon") | .version')"
          fi
          VERSION="$VERSION" scripts/package-linux.sh

      - name: Inspect deb package
        run: |
          set -eux
          for deb in dist/*.deb; do
            dpkg -I "$deb"
            dpkg -c "$deb"
          done

      - name: Inspect rpm package
        run: |
          set -eux
          for rpm in dist/*.rpm; do
            rpm -qpi "$rpm"
            rpm -qpl "$rpm"
            rpm -qpR "$rpm" || true
          done

      - name: Prepare checksums
        run: |
          set -eux
          cd dist
          sha256sum * > SHA256SUMS

      - name: Import GPG key
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "GPG_PRIVATE_KEY secret is required for release signing and package repo publishing."
            exit 1
          fi

          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

          GPG_FINGERPRINT="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')"
          if [ -z "$GPG_FINGERPRINT" ]; then
            echo "Could not detect GPG fingerprint."
            exit 1
          fi

          echo "GPG_FINGERPRINT=$GPG_FINGERPRINT" >> "$GITHUB_ENV"
          gpg --list-secret-keys --keyid-format LONG

      - name: GPG sign release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          for file in dist/*; do
            if [ -f "$file" ] && [ "${file##*.}" != "asc" ]; then
              if [ -n "${GPG_PASSPHRASE:-}" ]; then
                gpg --batch --yes \
                  --pinentry-mode loopback \
                  --passphrase "$GPG_PASSPHRASE" \
                  --default-key "$GPG_FINGERPRINT" \
                  --armor \
                  --detach-sign "$file"
              else
                gpg --batch --yes \
                  --default-key "$GPG_FINGERPRINT" \
                  --armor \
                  --detach-sign "$file"
              fi
            fi
          done

      - name: Verify GPG signatures
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -eux

          for sig in dist/*.asc; do
            file="${sig%.asc}"
            gpg --verify "$sig" "$file"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-x64
          path: dist/

  publish-release:
    name: Publish package repositories & GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - release-linux-x64
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Install repo tooling
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c dpkg-dev gnupg git

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "dist-*"
          path: artifacts

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "GPG_PRIVATE_KEY secret is required for release signing and package repo publishing."
            exit 1
          fi

          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import

          GPG_FINGERPRINT="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')"
          if [ -z "$GPG_FINGERPRINT" ]; then
            echo "Could not detect GPG fingerprint."
            exit 1
          fi

          echo "GPG_FINGERPRINT=$GPG_FINGERPRINT" >> "$GITHUB_ENV"

      - name: Publish package repositories
        env:
          PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${PACKAGES_REPO_TOKEN:-}" ]; then
            echo "PACKAGES_REPO_TOKEN is missing; skipping packages.tamkungz.me publish."
            exit 0
          fi

          WORK_DIR="$PWD"
          SITE_DIR="$WORK_DIR/packages-site"
          REPO_URL="https://x-access-token:${PACKAGES_REPO_TOKEN}@github.com/TamKungZ/packages.tamkungz.me.git"

          git clone --depth 1 "$REPO_URL" "$SITE_DIR"

          cd "$SITE_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "packages.tamkungz.me" > CNAME
          touch .nojekyll

          gpg --armor --export "$GPG_FINGERPRINT" > gpg.key

          prune_package_files() {
            local keep="$1"
            local pattern="$2"
            local files=()
            local remove=()

            mapfile -t files < <(find . -type f -path "$pattern" | sort -V)
            if [ "${#files[@]}" -le "$keep" ]; then
              return 0
            fi

            remove=("${files[@]:0:${#files[@]}-$keep}")
            for file in "${remove[@]}"; do
              rm -f "$file" "$file.asc" "$file.sig"
            done
          }

          mkdir -p apt/pool/main/l/livedesk
          mkdir -p apt/dists/stable/main/binary-amd64
          rm -rf apps/livedesk
          mkdir -p apps/livedesk

          cat > apps/livedesk/README.md <<'EOF'
          # Livedesk

          Livedesk is a live video wallpaper app for GNOME. It includes a GNOME Shell extension, a native GStreamer daemon, and a GTK/Libadwaita configuration app.
          EOF

          cp "$WORK_DIR"/artifacts/dist-linux-x64/livedesk_*.deb apt/pool/main/l/livedesk/
          cp "$WORK_DIR"/artifacts/dist-linux-x64/livedesk_*.deb.asc apt/pool/main/l/livedesk/ 2>/dev/null || true

          prune_package_files 5 './apt/pool/main/l/livedesk/livedesk_*.deb'

          cd "$SITE_DIR/apt"

          dpkg-scanpackages --multiversion --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          gzip -9fk dists/stable/main/binary-amd64/Packages

          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="TamKungZ_" \
            -o APT::FTPArchive::Release::Label="TamKungZ_ Packages" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="TamKungZ_ APT Package Repository" \
            release dists/stable > dists/stable/Release

          if [ -n "${GPG_PASSPHRASE:-}" ]; then
            gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --default-key "$GPG_FINGERPRINT" \
              --clearsign \
              -o dists/stable/InRelease dists/stable/Release

            gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --default-key "$GPG_FINGERPRINT" \
              -abs \
              -o dists/stable/Release.gpg dists/stable/Release
          else
            gpg --batch --yes \
              --default-key "$GPG_FINGERPRINT" \
              --clearsign \
              -o dists/stable/InRelease dists/stable/Release

            gpg --batch --yes \
              --default-key "$GPG_FINGERPRINT" \
              -abs \
              -o dists/stable/Release.gpg dists/stable/Release
          fi

          cd "$SITE_DIR"

          mkdir -p rpm/x86_64
          cp "$WORK_DIR"/artifacts/dist-linux-x64/livedesk-*.rpm rpm/x86_64/
          cp "$WORK_DIR"/artifacts/dist-linux-x64/livedesk-*.rpm.asc rpm/x86_64/ 2>/dev/null || true

          prune_package_files 5 './rpm/x86_64/livedesk-*.rpm'

          createrepo_c rpm/x86_64

          if [ -n "${GPG_PASSPHRASE:-}" ]; then
            gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --default-key "$GPG_FINGERPRINT" \
              --detach-sign \
              --armor \
              rpm/x86_64/repodata/repomd.xml
          else
            gpg --batch --yes \
              --default-key "$GPG_FINGERPRINT" \
              --detach-sign \
              --armor \
              rpm/x86_64/repodata/repomd.xml
          fi

          if [ -f scripts/build_site.py ]; then
            python3 scripts/build_site.py
          else
            echo "scripts/build_site.py not found; skipping HTML index generation."
          fi

          git add -A

          if git diff --cached --quiet; then
            echo "No package repository changes to publish."
          else
            git commit -m "Update Livedesk packages ${GITHUB_REF_NAME:-manual}"
            git push origin HEAD
          fi

      - name: Assemble GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          mkdir -p release-assets
          cp artifacts/dist-linux-x64/* release-assets/
          rm -f release-assets/SHA256SUMS release-assets/SHA256SUMS.asc
          ( cd release-assets && sha256sum * > SHA256SUMS )

          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber --repo "$REPO"
          else
            gh release create "$TAG" release-assets/* \
              --repo "$REPO" \
              --title "Livedesk ${TAG}" \
              --notes "Release ${TAG}"
          fi
